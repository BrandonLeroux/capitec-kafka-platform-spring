server.port=8083
spring.application.name=spring-inventory-service

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092}
spring.kafka.consumer.group-id=inventory-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.isolation-level=read_committed
spring.kafka.listener.ack-mode=manual_immediate

app.topics.inventory=inventory
app.db.path=/data/inventory.db
spring.datasource.url=jdbc:sqlite:${app.db.path}
spring.datasource.driver-class-name=org.sqlite.JDBC

management.endpoints.web.exposure.include=health,info
