server.port=8081
spring.application.name=spring-order-service

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092}

# Consumer
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.isolation-level=read_committed
spring.kafka.consumer.max-poll-records=50
spring.kafka.listener.ack-mode=manual_immediate

# Producer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=2147483647
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.linger.ms=5
spring.kafka.producer.properties.batch.size=32768
spring.kafka.producer.properties.compression.type=lz4
spring.kafka.producer.properties.delivery.timeout.ms=120000

# Topics — configurable via environment variables to match lab spec
# Lab names: ORDER_TOPIC=order.placed, PAYMENT_SUCCESS_TOPIC=payment.succeeded, PAYMENT_FAILED_TOPIC=payment.failed
app.topics.order=${ORDER_TOPIC:order-created}
app.topics.customer=customer-created
app.topics.cancelled=order-cancelled
app.topics.payment=${PAYMENT_SUCCESS_TOPIC:payment-init}
app.topics.payment-failed=${PAYMENT_FAILED_TOPIC:order-cancelled}

# SQLite
app.db.path=/data/orders.db
spring.datasource.url=jdbc:sqlite:${app.db.path}
spring.datasource.driver-class-name=org.sqlite.JDBC

# Actuator
app.inventory-service.url=http://spring-inventory-service:8083
management.endpoints.web.exposure.include=health,info
