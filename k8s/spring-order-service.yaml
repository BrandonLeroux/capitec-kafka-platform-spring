apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-order-service
  template:
    metadata:
      labels:
        app: spring-order-service
    spec:
      containers:
        - name: spring-order-service
          image: spring-order-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: data
              mountPath: /data

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: spring-order-service
spec:
  selector:
    app: spring-order-service
  ports:
    - port: 8081
      targetPort: 8081
