apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-payment-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-payment-processor
  template:
    metadata:
      labels:
        app: spring-payment-processor
    spec:
      containers:
        - name: spring-payment-processor
          image: spring-payment-processor:latest
          imagePullPolicy: Never
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
